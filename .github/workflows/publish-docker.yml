name: dockerhub-from-release

on:
  release:
    types:
      - published
      - released
      - prereleased
  workflow_run:
    workflows:
      - release
    types:
      - completed

permissions:
  contents: read

jobs:
  publish:
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/prcheckerbot
    steps:
      - name: Checkout (release event)
        if: github.event_name == 'release'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Checkout (workflow run event)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
          else
            tag="$(git tag --points-at HEAD | sort -V | tail -n1)"
          fi

          if [ -z "$tag" ]; then
            echo "No release tag resolved for this event; skipping Docker publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Resolved release tag: $tag"
          echo "value=$tag" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        if: steps.tag.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: steps.tag.outputs.skip != 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        if: steps.tag.outputs.skip != 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.value }}

      - name: Build and push image
        if: steps.tag.outputs.skip != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
