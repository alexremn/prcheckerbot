name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: find src -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Validate default config JSON
        run: node -e "JSON.parse(require('fs').readFileSync('config/default.json','utf8'))"

      - name: Run tests
        run: npm test
