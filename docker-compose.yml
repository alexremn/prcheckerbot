version: "3.8"

services:
  pr-bot:
    build: .
    ports:
      - "3000:3000"
    environment:
      # GitHub App credentials (required)
      - APP_ID=${APP_ID}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      # Optional: for local development with smee.io
      - WEBHOOK_PROXY_URL=${WEBHOOK_PROXY_URL}
      # Logging level
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Optional custom config path (inside container)
      - PR_CHECKER_CONFIG_PATH=${PR_CHECKER_CONFIG_PATH}
    env_file:
      - .env
    restart: unless-stopped
